<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Documentación del Departamento</title>
    <style>
        :root {
            --bg-primary: #fbfbfa;
            --bg-sidebar: #f7f7f5;
            --text-main: #37352f;
            --text-muted: #7c7a77;
            --accent: #2383e2;
            --border: #edece9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--bg-primary); color: var(--text-main); }

        .sidebar { width: 260px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 16px; }
        .brand { font-size: 16px; font-weight: 600; margin-bottom: 24px; padding-left: 8px; display: flex; align-items: center; gap: 8px; }
        .search-box { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: #fff; margin-bottom: 20px; font-size: 14px; outline: none; }
        .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(35, 131, 226, 0.2); }
        
        .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; padding-left: 8px; letter-spacing: 0.5px; }
        .filter-btn { display: block; width: 100%; text-align: left; padding: 8px; margin-bottom: 4px; border: none; background: transparent; border-radius: 4px; cursor: pointer; font-size: 14px; color: var(--text-main); }
        .filter-btn:hover, .filter-btn.active { background-color: var(--border); }
        .filter-btn.active { font-weight: 600; }

        .notes-list-pane { width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: #fff; }
        .pane-header { padding: 24px 20px 12px 20px; font-size: 18px; font-weight: 700; }
        .notes-container { flex: 1; overflow-y: auto; padding: 0 12px; }
        .note-card { padding: 12px 8px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; border-bottom: 1px solid #fcfcfc; transition: background 0.15s ease; }
        .note-card:hover { background-color: var(--bg-sidebar); }
        .note-card.active { background-color: #f0f0ee; }
        .note-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .note-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 8px; align-items: center; }
        
        .tag { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
        .tag-noticias { background: #faecec; color: #e03e3e; }
        .tag-procedimientos { background: #eef3fc; color: #1d4ed8; }
        .tag-manuales { background: #edf7ed; color: #1e4620; }

        .content-pane { flex: 1; overflow-y: auto; padding: 60px 80px; background: #fff; }
        .content-container { max-width: 700px; margin: 0 auto; animation: fadeIn 0.2s ease; }
        .doc-category { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
        .doc-title { font-size: 40px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .doc-date { font-size: 14px; color: var(--text-muted); margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        .doc-body { font-size: 16px; line-height: 1.6; color: #2f2e2b; white-space: pre-line; }
        .empty-state { display: flex; height: 100%; align-items: center; justify-content: center; color: var(--text-muted); font-size: 15px; text-align: center; line-height: 1.5; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">🚀 Centro de Control</div>
        <input type="text" id="search" class="search-box" placeholder="Buscar en manuales...">
        
        <div class="section-title">Categorías</div>
        <button class="filter-btn active" onclick="filtrarCategoria('todos', this)">📄 Todos los documentos</button>
        <button class="filter-btn" onclick="filtrarCategoria('Noticias', this)">📰 Noticias</button>
        <button class="filter-btn" onclick="filtrarCategoria('Procedimientos', this)">⚙️ Procedimientos</button>
        <button class="filter-btn" onclick="filtrarCategoria('Manuales', this)">📘 Manuales</button>
    </div>

    <div class="notes-list-pane">
        <div class="pane-header" id="list-title">Todos los documentos</div>
        <div class="notes-container" id="notes-list"></div>
    </div>

    <div class="content-pane" id="content-pane">
        <div class="empty-state">Selecciona un documento para visualizar su contenido.<br>Usa el buscador para filtrar palabras clave.</div>
    </div>

    <script>
        // ==========================================
        //  BASE DE DATOS DE DOCUMENTOS (FÁCIL EDITAR)
        // ==========================================
        const DATA_DOCUMENTOS = [
            {
                id: 1,
                titulo: "Manual de Bienvenida al Departamento",
                categoria: "Manuales",
                fecha: "01 de Julio, 2026",
                contenido: "Bienvenido al equipo.\n\nEste manual contiene las pautas básicas para tus primeros días en el departamento:\n\n1. Horarios y accesos: El horario base es de 8:00 a 17:00.\n2. Canales de comunicación: Usamos el correo interno para comunicaciones formales.\n3. Sistemas clave: Solicita tus credenciales con el equipo técnico usando el formato oficial."
            },
            {
                id: 2,
                titulo: "Procedimiento para Reporte de Fallas de Red",
                categoria: "Procedimientos",
                fecha: "28 de Junio, 2026",
                contenido: "Objetivo: Resolver incidentes de conectividad de forma estructurada.\n\nPasos a seguir:\n1. Verificar si el fallo afecta a un solo equipo o a todo el piso.\n2. Tomar captura de pantalla del código de error.\n3. Enviar un correo a soporte@empresa.local con la etiqueta [FALLO RED] en el asunto."
            },
            {
                id: 3,
                titulo: "Cambio en la política de teletrabajo",
                categoria: "Noticias",
                fecha: "15 de Junio, 2026",
                contenido: "Estimado equipo,\n\nA partir del próximo mes, se habilitará un esquema híbrido flexible. Cada miembro podrá coordinar con su supervisor directo los 2 días de trabajo remoto semanales."
            }
        ];

        // Lógica interna de la aplicación
        let categoriaActual = 'todos';
        let busquedaActual = '';

        function renderizarLista() {
            const container = document.getElementById('notes-list');
            container.innerHTML = '';

            const filtrados = DATA_DOCUMENTOS.filter(doc => {
                const cumpleCategoria = categoriaActual === 'todos' || doc.categoria === categoriaActual;
                const cumpleBusqueda = doc.titulo.toLowerCase().includes(busquedaActual.toLowerCase()) || 
                                       doc.contenido.toLowerCase().includes(busquedaActual.toLowerCase());
                return cumpleCategoria && cumpleBusqueda;
            });

            if(filtrados.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align:center; color: var(--text-muted); font-size: 14px;">No hay resultados</div>';
                return;
            }

            filtrados.forEach(doc => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.onclick = () => mostrarDocumento(doc.id, card);
                card.innerHTML = `
                    <div class="note-title">${doc.titulo}</div>
                    <div class="note-meta">
                        <span class="tag tag-${doc.categoria.toLowerCase()}">${doc.categoria}</span>
                        <span>${doc.fecha}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function mostrarDocumento(id, elementoCard) {
            document.querySelectorAll('.note-card').forEach(c => c.classList.remove('active'));
            if(elementoCard) elementoCard.classList.add('active');

            const doc = DATA_DOCUMENTOS.find(d => d.id === id);
            const visor = document.getElementById('content-pane');

            if (doc) {
                visor.innerHTML = `
                    <div class="content-container">
                        <div class="doc-category">${doc.categoria}</div>
                        <h1 class="doc-title">${doc.titulo}</h1>
                        <div class="doc-date">Publicado el ${doc.fecha}</div>
                        <div class="doc-body">${doc.contenido}</div>
                    </div>
                `;
            }
        }

        function filtrarCategoria(categoria, elementoBoton) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            elementoBoton.classList.add('active');
            categoriaActual = categoria;
            document.getElementById('list-title').innerText = categoria === 'todos' ? 'Todos los documentos' : categoria;
            renderizarLista();
        }

        document.getElementById('search').addEventListener('input', (e) => {
            busquedaActual = e.target.value;
            renderizarLista();
        });

        renderizarLista();
    </script>
</body>
</html>
